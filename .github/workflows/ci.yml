name: CI

on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  check-node:
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.check.outputs.has_node }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f package.json ]; then
            echo "has_node=true" >> $GITHUB_OUTPUT
          else
            echo "has_node=false" >> $GITHUB_OUTPUT
          fi

  lint:
    runs-on: ubuntu-latest
    needs: check-node
    if: needs.check-node.outputs.has_node == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: [check-node, lint]
    if: needs.check-node.outputs.has_node == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  security:
    runs-on: ubuntu-latest
    needs: check-node
    steps:
      - uses: actions/checkout@v4
      - name: Node 安全审计
        if: needs.check-node.outputs.has_node == 'true'
        run: npm audit --audit-level=high
      - name: 通用安全扫描
        if: needs.check-node.outputs.has_node != 'true'
        run: |
          echo "无 Node.js 项目，跳过 npm audit"
          echo "可在此添加通用安全扫描步骤"
